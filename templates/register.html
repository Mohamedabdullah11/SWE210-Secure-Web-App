{% extends 'base.html' %}
{% block title %}Register — SecureApp{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Your data is encrypted at rest</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username <span class="required">*</span></label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" required placeholder="Min 8 characters">
                <div class="password-strength" id="strengthBar"></div>
            </div>
            <div class="form-group">
                <label for="email">Email <span class="enc-tag">🔐 encrypted</span></label>
                <input type="email" id="email" name="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone <span class="enc-tag">🔐 encrypted</span></label>
                <input type="text" id="phone" name="phone" placeholder="+1 234 567 8900">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
